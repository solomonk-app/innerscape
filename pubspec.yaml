name: feelong
description: Feelong — AI Mood Journal for everyone.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  shared_preferences: ^2.2.2
  http: ^1.1.2
  fl_chart: ^0.66.0
  intl: ^0.19.0
  google_fonts: ^6.1.0
  uuid: ^4.2.1
  animate_do: ^3.3.3
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.2
  flutter_timezone: ^3.0.1
  lottie: ^3.0.0
  google_mobile_ads: ^5.3.0
  app_tracking_transparency: ^2.0.6
  just_audio: ^0.9.39
  url_launcher: ^6.2.1
  firebase_core: ^4.5.0
  firebase_analytics: ^12.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon_ios.png"
  adaptive_icon_background: "#1A1512"
  adaptive_icon_foreground: "assets/icon/app_icon_ios.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/audio/
